name: Apply Ekklesia Pulse Brand Migration

on:
  push:
    branches:
      - agent/rename-eklesia-to-ekklesia-pulse
  workflow_dispatch:

permissions:
  contents: write

jobs:
  migrate-and-validate:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Check out migration branch
        uses: actions/checkout@v4
        with:
          ref: agent/rename-eklesia-to-ekklesia-pulse

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Apply controlled branding changes
        run: node scripts/apply-brand-migration.mjs

      - name: Install dependencies and refresh lock metadata
        run: npm install

      - name: Validate repository-wide branding
        run: node scripts/apply-brand-migration.mjs --check

      - name: Validate Bible data
        run: npm run validate:bible

      - name: Build GitHub Pages production bundle
        run: npm run build -- --base=/Eklesia/

      - name: Confirm Bible source data is unchanged
        run: git diff --exit-code -- src/data/bible

      - name: Check patch formatting
        run: git diff --check

      - name: Remove one-time migration automation
        run: rm scripts/apply-brand-migration.mjs .github/workflows/brand-migration.yml

      - name: Commit validated migration
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Rename Eklesia to Ekklesia Pulse"
          git push origin HEAD:agent/rename-eklesia-to-ekklesia-pulse
