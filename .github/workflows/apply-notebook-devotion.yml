name: Apply notebook devotion implementation

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply-and-validate:
    if: github.head_ref == 'agent/notebook-devotion-capture'
    runs-on: ubuntu-latest
    steps:
      - name: Check out feature branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Reconstruct and verify implementation patch
        shell: bash
        run: |
          set -euo pipefail
          cat .github/notebook-patch/part-* > /tmp/notebook-devotion.patch.gz.b64
          base64 --decode /tmp/notebook-devotion.patch.gz.b64 | gzip --decompress > /tmp/notebook-devotion.patch
          echo 'fb7ba93e57d94ab5de6c2e8ad286278faef586fcbd837c27523d0ae23ce6b56c  /tmp/notebook-devotion.patch' | sha256sum --check
          git apply --check /tmp/notebook-devotion.patch
          git apply /tmp/notebook-devotion.patch

      - name: Remove temporary transfer files
        shell: bash
        run: |
          rm -rf .github/notebook-patch
          rm -f .github/workflows/temporary-source-export.yml
          rm -f .github/workflows/apply-notebook-devotion.yml

      - name: Install dependencies
        run: npm ci

      - name: Validate Bible and build production bundle
        run: npm run build

      - name: Commit validated implementation
        shell: bash
        run: |
          set -euo pipefail
          rm -rf node_modules dist
          git config user.name 'Ekklesia Actions'
          git config user.email 'actions@users.noreply.github.com'
          git add -A
          git diff --cached --check
          git commit -m 'Add private notebook devotion capture'
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
