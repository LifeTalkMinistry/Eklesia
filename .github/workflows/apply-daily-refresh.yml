name: Apply Daily Suggestion Refresh

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply-and-validate:
    if: github.actor != 'github-actions[bot]' && github.head_ref == 'agent/devotion-suggestion-refresh'
    runs-on: ubuntu-latest

    steps:
      - name: Check out feature branch
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.ref }}
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Apply feature changes
        run: node scripts/apply-daily-suggestion-refresh.mjs

      - name: Install dependencies
        run: npm install

      - name: Build Ekklesia Pulse
        run: npm run build -- --base=/Eklesia/

      - name: Check patch formatting
        run: git diff --check

      - name: Commit validated application files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/App.jsx src/components/Dashboard.jsx src/components/TodayDevotionCard.jsx src/devotion-flip.css
          git commit -m "Add daily devotion suggestion refresh"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
